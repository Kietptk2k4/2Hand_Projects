<!DOCTYPE html>

                    "on-primary": "#ffffff",
                    "secondary": "#4648d4",

                    "secondary-container": "#6063ee",

                    "xl": "64px",

                    "base": "8px",
                    "xs": "4px",

<body class="h-full bg-surface-container-low flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-body-md text-on-surface">
<div class="sm:mx-auto sm:w-full sm:max-w-md">
<!-- Logo / Brand Anchor -->
<div class="flex justify-center mb-6">
<span class="material-symbols-outlined text-primary" style="font-size: 48px; font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</div>
<h2 class="mt-2 text-center font-headline-lg text-headline-lg text-on-surface tracking-tight">
            2Hands Admin Portal
        </h2>
<p class="mt-2 text-center font-body-sm text-body-sm text-on-surface-variant">
            Secure management access
        </p>
</div>
<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
<div class="bg-surface-container-lowest py-8 px-4 shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1)] sm:rounded-lg sm:px-10 border border-outline-variant">
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface" for="email">Email address</label>
<div class="mt-1">
<input autocomplete="email" class="appearance-none block w-full px-3 py-2 border border-outline-variant rounded-DEFAULT shadow-sm placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-surface-container-lowest text-on-surface" id="email" name="email" required="" type="email"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="mt-1">
<input autocomplete="current-password" class="appearance-none block w-full px-3 py-2 border border-outline-variant rounded-DEFAULT shadow-sm placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-surface-container-lowest text-on-surface" id="password" name="password" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-variant" href="#">
                            Forgot your password?
                        </a>
</div>
</div>
<div>
<button class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary-container hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                        Login
                    </button>
</div>
</form>
</div>
<!-- Return Link -->
<div class="mt-6 text-center">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-2" href="#">
<span class="material-symbols-outlined" style="font-size: 16px;">arrow_back</span>
                Return to marketplace
            </a>
</div>
</div>
</body></html>
