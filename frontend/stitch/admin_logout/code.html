        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden flex font-body-md text-body-md">
<!-- Blurred Background Context (Dashboard Mockup) -->
<div class="absolute inset-0 z-0 flex filter blur-sm opacity-60">
<!-- Mock SideNav -->
<div class="h-screen w-64 bg-surface-container flex flex-col py-md border-r border-outline-variant">
<div class="px-md mb-xl">
<span class="font-headline-md text-headline-md text-primary font-bold">2Hands</span>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs">Admin Console</p>
</div>
<nav class="flex-1 px-sm space-y-xs">
<div class="flex items-center gap-sm px-sm py-sm rounded-lg bg-surface-variant text-on-surface-variant">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</div>
</nav>
</div>
<!-- Mock Main Content -->
<div class="flex-1 flex flex-col bg-surface">
<!-- Mock TopNav -->
<div class="h-16 border-b border-outline-variant flex items-center justify-between px-margin-desktop bg-surface">
<div class="font-headline-sm text-headline-sm text-primary font-black">2Hands Admin</div>
<div class="flex items-center gap-md text-on-surface-variant">
<span class="material-symbols-outlined">notifications</span>
<span class="material-symbols-outlined">account_circle</span>
</div>
</div>
<!-- Mock Canvas -->
<div class="p-margin-desktop space-y-md">
<div class="h-32 bg-surface-container rounded-lg border border-outline-variant"></div>
<div class="grid grid-cols-3 gap-md">
<div class="h-64 bg-surface-container rounded-lg border border-outline-variant col-span-2"></div>
<div class="h-64 bg-surface-container rounded-lg border border-outline-variant"></div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 z-50 flex items-center justify-center bg-inverse-surface/40 backdrop-blur-sm px-margin-mobile">
<!-- Modal Container -->
<div aria-labelledby="modal-title" aria-modal="true" class="bg-surface-container-lowest w-full max-w-md rounded-xl shadow-[0px_10px_15px_-3px_rgba(0,0,0,0.1)] border border-outline-variant overflow-hidden" role="dialog">
<!-- Modal Header (Icon + Title) -->
<div class="px-md pt-md pb-sm flex flex-col items-center text-center">
<div class="w-12 h-12 rounded-full bg-error-container flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">logout</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-background" id="modal-title">Xác nhận Đăng xuất</h2>
</div>
<!-- Modal Body -->
<div class="px-md py-sm text-center">
<p class="font-body-md text-body-md text-on-surface-variant mb-xs">
                    Bạn có chắc chắn muốn kết thúc phiên làm việc này?
                </p>
<p class="font-body-sm text-body-sm text-tertiary">
                    Refresh token sẽ bị thu hồi theo quy định bảo mật.
                </p>
</div>
<!-- Modal Footer (Actions) -->
<div class="px-md py-md flex items-center gap-sm mt-sm bg-surface-container-low/50 border-t border-outline-variant/50">
<button class="flex-1 h-10 px-md rounded-lg font-label-md text-label-md text-on-surface-variant bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low transition-colors duration-200" type="button">
                    Hủy
                </button>
<button class="flex-1 h-10 px-md rounded-lg font-label-md text-label-md text-on-error bg-error hover:bg-on-error-container transition-colors duration-200 shadow-[0px_4px_6px_-1px_rgba(0,0,0,0.1)]" type="button">
                    Đăng xuất
                </button>
</div>
</div>
