<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Settings Sidebar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="font-setup">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0066ff',
            surface: '#f9f9ff',
            'surface-dim': '#cfdaf2',
            'surface-low': '#f0f3ff',
            'text-main': '#1a1f36',
            'text-muted': '#4f566b',
            'danger': '#d92d20'
          },
          borderRadius: {
            'custom': '8px'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 p-8 flex justify-center items-start h-screen">
<!-- BEGIN: ProfileSettingsSidebar -->
<aside class="w-[280px] bg-surface h-full min-h-[720px] rounded-custom shadow-sm flex flex-col border border-surface-dim overflow-hidden" data-purpose="sidebar-container">
<!-- Profile Header -->
<div class="flex flex-col items-center pt-8 pb-6 px-6" data-purpose="profile-header">
<img alt="User Avatar" class="w-20 h-20 rounded-full object-cover mb-4 shadow-sm border-2 border-white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmQ6lobF0gqsUfjZ9gjoufMClUcmXVaLb9qUsncv38cSe8L8aQ0eVm7dY97Sb-n4jbezOXtiCGbLHihf6zYr0h_9-_hEXEVtRro-HwWhwIL8QEoXvHKUVetUfrUzMjMa0p_ZRixPfaUiO9MR3j4YQW78fLW8TRvHCIflL9315hLFldJSf7x40JeABBPFLr-nWZTr3na8_XtnNqE2HF6n7K-reoGdapSLkAEDxGG9BEkBab4YiuWae1RyqjnyFwq2Nn1KYgR9-Sg_U"/>
<h2 class="text-xl font-semibold text-text-main mb-1">Profile Settings</h2>
<p class="text-sm text-text-muted text-center">Manage your 2Hands account</p>
</div>
<!-- Navigation Menu -->
<nav class="flex-1 px-4 space-y-1" data-purpose="navigation-menu">
<!-- Nav Item: Account Info -->
<a class="flex items-center gap-3 px-4 py-3 rounded-custom text-text-muted hover:bg-surface-low hover:text-primary transition-colors group" href="#">
<svg class="w-5 h-5 text-text-muted group-hover:text-primary" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-sm font-medium">Account Info</span>
</a>
<!-- Nav Item: Edit Profile (Active) -->
<a class="flex items-center gap-3 px-4 py-3 rounded-custom bg-surface-low text-primary relative group" href="#">
<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-sm font-semibold">Edit Profile</span>
<!-- Active Indicator Line -->
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-primary rounded-l-full"></div>
</a>
<!-- Nav Item: Update Avatar -->
<a class="flex items-center gap-3 px-4 py-3 rounded-custom text-text-muted hover:bg-surface-low hover:text-primary transition-colors group" href="#">
<svg class="w-5 h-5 text-text-muted group-hover:text-primary" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-sm font-medium">Update Avatar</span>
</a>
<!-- Nav Item: Privacy -->
<a class="flex items-center gap-3 px-4 py-3 rounded-custom text-text-muted hover:bg-surface-low hover:text-primary transition-colors group" href="#">
<svg class="w-5 h-5 text-text-muted group-hover:text-primary" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-sm font-medium">Privacy</span>
</a>
<!-- Nav Item: Settings -->
<a class="flex items-center gap-3 px-4 py-3 rounded-custom text-text-muted hover:bg-surface-low hover:text-primary transition-colors group" href="#">
<svg class="w-5 h-5 text-text-muted group-hover:text-primary" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-sm font-medium">Settings</span>
</a>
</nav>
<!-- Danger Zone Footer -->
<div class="p-6 mt-auto" data-purpose="sidebar-footer">
<div class="border-t border-surface-dim pt-6">
<a class="flex items-center gap-3 px-4 py-3 rounded-custom text-danger hover:bg-red-50 transition-colors group" href="#">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-sm font-medium">Delete Account</span>
</a>
</div>
</div>
</aside>
<!-- END: ProfileSettingsSidebar -->
</body></html>
