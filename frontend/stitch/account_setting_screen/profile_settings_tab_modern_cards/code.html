<!-- Suppressed based on rule: task-focused settings page within profile -->
<script>
        // Micro-interaction for save button
        document.getElementById('saveThemeBtn').addEventListener('click', function() {
            const btn = this;
            const textSpan = btn.querySelector('.button-text');
            const spinner = btn.querySelector('.loading-spinner');
            const selectedTheme = document.querySelector('input[name="theme"]:checked').value;
            
            // Simulate loading state
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            textSpan.textContent = 'Đang lưu...';
            spinner.classList.remove('hidden');
            
            // Simulate API Call: PATCH /api/v1/users/me/settings { "appearance_mode": selectedTheme }
            setTimeout(() => {
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btn.classList.replace('bg-primary', 'bg-secondary-container');
                textSpan.textContent = 'Đã lưu thành công';
                spinner.classList.add('hidden');
                
                // Reset button after 2s
                setTimeout(() => {
                    btn.classList.replace('bg-secondary-container', 'bg-primary');
                    textSpan.textContent = 'Lưu thay đổi';
                }, 2000);
                
                console.log(`Simulated API PATCH to /api/v1/users/me/settings with payload: { "appearance_mode": "${selectedTheme}" }`);
            }, 1200);
        });

        // Add custom styling for custom radio buttons using JavaScript to ensure DOM interaction is visual
        const radioInputs = document.querySelectorAll('input[name="theme"]');
        radioInputs.forEach(input => {
            input.addEventListener('change', function() {
                // Remove visual selection from all inner custom radio circles
                document.querySelectorAll('input[name="theme"] + div .rounded-full.bg-primary').forEach(el => el.classList.replace('opacity-100', 'opacity-0'));
                // Add to selected
                if(this.checked) {
                   const selectedDot = this.nextElementSibling.querySelector('.rounded-full.bg-primary');
                   if(selectedDot) selectedDot.classList.replace('opacity-0', 'opacity-100');
                }
            });
        });
    </script>
