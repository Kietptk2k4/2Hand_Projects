# 2Hands dev gateway - single entry for ngrok remote demo (profile ngrok).
# Upstream: Docker service names from compose dev/apps profiles.
# Public HTTPS is terminated by ngrok; gateway sets X-Forwarded-Proto: https for backends.
#
# Use Docker embedded DNS + variable proxy_pass so nginx re-resolves service IPs
# after `docker compose ... --force-recreate` (avoids stale upstream 502).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 8080;
    server_name _;

    client_max_body_size 55m;

    # API routes - most specific prefix first
    location ^~ /commerce/api/ {
        set $commerce_upstream commerce-service:3003;
        proxy_pass http://$commerce_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /admin/api/ {
        set $admin_upstream admin-service:3004;
        proxy_pass http://$admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /api/v1/social/ {
        set $social_upstream social-service:3002;
        proxy_pass http://$social_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /api/v1/notification/ {
        set $notification_upstream notification-service:3005;
        proxy_pass http://$notification_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/2hands-(avatar|social-post|commerce-product|commerce-review|commerce-shop)/ {
        set $minio_upstream minio:9000;
        proxy_pass http://$minio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        client_max_body_size 55m;
        proxy_buffering off;
    }

    location ^~ /api/v1/ {
        set $auth_upstream auth-service:3001;
        proxy_pass http://$auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Spring Security OAuth2 (auth-service root paths — not under /api/v1/)
    location ^~ /oauth2/ {
        set $auth_upstream auth-service:3001;
        proxy_pass http://$auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location ^~ /login/oauth2/ {
        set $auth_upstream auth-service:3001;
        proxy_pass http://$auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Frontend SPA (production build mounted at /usr/share/nginx/html)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
