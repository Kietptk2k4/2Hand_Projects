services:

  postgres-auth:
    image: postgres:16
    container_name: postgres-auth

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: auth_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis

    ports:
      - "6379:6379"

volumes:
  postgres_auth_data: