services:

  postgres-auth:
    image: postgres:16
    container_name: postgres-auth

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: auth_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  postgres-social:
    image: postgres:16
    container_name: postgres-social

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: social_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_social_data:/var/lib/postgresql/data

  postgres-commerce:
    image: postgres:16
    container_name: postgres-commerce

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: commerce_db

    ports:
      - "5434:5432"

    volumes:
      - postgres_commerce_data:/var/lib/postgresql/data

  postgres-notification:
    image: postgres:16
    container_name: postgres-notification

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: notification_db

    ports:
      - "5435:5432"

    volumes:
      - postgres_notification_data:/var/lib/postgresql/data

  postgres-admin:
    image: postgres:16
    container_name: postgres-admin

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: admin_db

    ports:
      - "5436:5432"

    volumes:
      - postgres_admin_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: mongodb

    environment:
      MONGO_INITDB_DATABASE: social_db

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: redis

    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"

  kafka:
    image: apache/kafka:3.7.2
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      - kafka

volumes:
  postgres_auth_data:
  postgres_social_data:
  postgres_commerce_data:
  postgres_notification_data:
  postgres_admin_data:
  mongo_data:
  minio_data:
  kafka_data: