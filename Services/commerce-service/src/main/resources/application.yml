server:
  port: 3003

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

spring:
  application:
    name: commerce-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5434/commerce_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  servlet:
    multipart:
      max-file-size: ${COMMERCE_REVIEW_MEDIA_MAX_FILE_SIZE:50MB}
      max-request-size: ${COMMERCE_REVIEW_MEDIA_MAX_REQUEST_SIZE:520MB}

jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  refresh-secret: ${JWT_REFRESH_SECRET}
  access-expiration: 900000
  refresh-expiration: 2592000000

logging:
  level:
    com.twohands.commerce_service: DEBUG
    org.springframework.jdbc: DEBUG
    
commerce:
  checkout:
    cod-only-enabled: ${COMMERCE_CHECKOUT_COD_ONLY_ENABLED:false}
  finance:
    platform-commission-rate: ${COMMERCE_PLATFORM_COMMISSION_RATE:0.10}
    min-payout-amount: ${COMMERCE_MIN_PAYOUT_AMOUNT:100000}
  object-storage:
    enabled: ${COMMERCE_MINIO_ENABLED:false}
    endpoint: ${COMMERCE_MINIO_ENDPOINT:http://localhost:9000}
    presigned-endpoint: ${COMMERCE_MINIO_PRESIGNED_ENDPOINT:}
    public-url: ${COMMERCE_MINIO_PUBLIC_URL:http://localhost:9000}
    access-key: ${COMMERCE_MINIO_ACCESS_KEY:admin}
    secret-key: ${COMMERCE_MINIO_SECRET_KEY:password123}
    shop-bucket: ${COMMERCE_MINIO_BUCKET_SHOP:2hands-commerce-shop}
    product-bucket: ${COMMERCE_MINIO_BUCKET_PRODUCT:2hands-commerce-product}
    review-bucket: ${COMMERCE_MINIO_BUCKET_REVIEW:2hands-commerce-review}
    shop-media-max-file-size-bytes: ${COMMERCE_SHOP_MEDIA_MAX_FILE_SIZE_BYTES:5242880}
    product-media-max-file-size-bytes: ${COMMERCE_PRODUCT_MEDIA_MAX_FILE_SIZE_BYTES:5242880}
    product-media-max-video-file-size-bytes: ${COMMERCE_PRODUCT_MEDIA_MAX_VIDEO_FILE_SIZE_BYTES:52428800}
    product-media-max-count: ${COMMERCE_PRODUCT_MEDIA_MAX_COUNT:10}
    product-media-max-video-count: ${COMMERCE_PRODUCT_MEDIA_MAX_VIDEO_COUNT:1}
    presigned-url-ttl-seconds: ${COMMERCE_MINIO_PRESIGNED_URL_TTL_SECONDS:900}
    allowed-shop-media-content-types:
      - image/jpeg
      - image/png
      - image/webp
    allowed-product-media-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - video/mp4
      - video/webm
  kafka:
    producer:
      enabled: ${COMMERCE_KAFKA_PRODUCER_ENABLED:false}
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      send-timeout-ms: ${COMMERCE_KAFKA_PRODUCER_SEND_TIMEOUT_MS:10000}
  outbox:
    publish:
      enabled: ${COMMERCE_OUTBOX_PUBLISH_ENABLED:false}
      cron: ${COMMERCE_OUTBOX_PUBLISH_CRON:0/1 * * * * *}
      max-retries: ${COMMERCE_OUTBOX_PUBLISH_MAX_RETRIES:5}
      batch-size: ${COMMERCE_OUTBOX_PUBLISH_BATCH_SIZE:50}
    retry:
      enabled: ${COMMERCE_OUTBOX_RETRY_ENABLED:false}
      cron: ${COMMERCE_OUTBOX_RETRY_CRON:0 */1 * * * *}
      max-retries: ${COMMERCE_OUTBOX_RETRY_MAX_RETRIES:5}
      pending-timeout-seconds: ${COMMERCE_OUTBOX_RETRY_PENDING_TIMEOUT_SECONDS:300}
      batch-size: ${COMMERCE_OUTBOX_RETRY_BATCH_SIZE:50}
  jobs:
    auto-cancel-unpaid-order:
      enabled: ${COMMERCE_AUTO_CANCEL_UNPAID_ORDER_ENABLED:false}
      cron: ${COMMERCE_AUTO_CANCEL_UNPAID_ORDER_CRON:0 */10 * * * *}
      batch-size: ${COMMERCE_AUTO_CANCEL_UNPAID_ORDER_BATCH_SIZE:50}
      order-ttl-minutes: ${COMMERCE_AUTO_CANCEL_UNPAID_ORDER_TTL_MINUTES:30}
    auto-complete-delivered-order:
      enabled: ${COMMERCE_AUTO_COMPLETE_DELIVERED_ORDER_ENABLED:false}
      cron: ${COMMERCE_AUTO_COMPLETE_DELIVERED_ORDER_CRON:0 0 * * * *}
      batch-size: ${COMMERCE_AUTO_COMPLETE_DELIVERED_ORDER_BATCH_SIZE:50}
      completion-window-days: ${COMMERCE_AUTO_COMPLETE_DELIVERED_ORDER_WINDOW_DAYS:7}
    sync-cart-item-status:
      enabled: ${COMMERCE_SYNC_CART_ITEM_STATUS_ENABLED:false}
      cron: ${COMMERCE_SYNC_CART_ITEM_STATUS_CRON:0 */5 * * * *}
      batch-size: ${COMMERCE_SYNC_CART_ITEM_STATUS_BATCH_SIZE:100}
  integrations:
    auth:
      enabled: ${COMMERCE_AUTH_INTEGRATION_ENABLED:true}
      base-url: ${COMMERCE_AUTH_INTEGRATION_BASE_URL:http://localhost:3001}
    payos:
      enabled: ${COMMERCE_PAYOS_ENABLED:false}
      base-url: ${COMMERCE_PAYOS_BASE_URL:https://api-merchant.payos.vn}
      client-id: ${COMMERCE_PAYOS_CLIENT_ID:}
      api-key: ${COMMERCE_PAYOS_API_KEY:}
      checksum-key: ${COMMERCE_PAYOS_CHECKSUM_KEY:}
      return-url: ${COMMERCE_PAYOS_RETURN_URL:}
      cancel-url: ${COMMERCE_PAYOS_CANCEL_URL:}
      mock-fallback-enabled: ${COMMERCE_PAYOS_MOCK_FALLBACK_ENABLED:true}
      webhook-secret: ${COMMERCE_PAYOS_WEBHOOK_SECRET:}
    vnpay:
      enabled: ${COMMERCE_VNPAY_ENABLED:false}
      tmn-code: ${COMMERCE_VNPAY_TMN_CODE:}
      hash-secret: ${COMMERCE_VNPAY_HASH_SECRET:}
      pay-url: ${COMMERCE_VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${COMMERCE_VNPAY_RETURN_URL:}
      frontend-return-base-url: ${COMMERCE_VNPAY_FRONTEND_RETURN_BASE_URL:http://localhost:5173}
      mock-fallback-enabled: ${COMMERCE_VNPAY_MOCK_FALLBACK_ENABLED:true}
    ghn:
      enabled: ${COMMERCE_GHN_ENABLED:false}
      mock-fallback-enabled: ${COMMERCE_GHN_MOCK_FALLBACK_ENABLED:true}
      base-url: ${COMMERCE_GHN_BASE_URL:https://dev-online-gateway.ghn.vn}
      token: ${COMMERCE_GHN_TOKEN:}
      shop-id: ${COMMERCE_GHN_SHOP_ID:}
      webhook-secret: ${COMMERCE_GHN_WEBHOOK_SECRET:}
      default-service-type-id: ${COMMERCE_GHN_DEFAULT_SERVICE_TYPE_ID:2}
      default-service-id: ${COMMERCE_GHN_DEFAULT_SERVICE_ID:}
      default-package-length-cm: ${COMMERCE_GHN_DEFAULT_PACKAGE_LENGTH_CM:20}
      default-package-width-cm: ${COMMERCE_GHN_DEFAULT_PACKAGE_WIDTH_CM:20}
      default-package-height-cm: ${COMMERCE_GHN_DEFAULT_PACKAGE_HEIGHT_CM:10}
      track-sync-cooldown-seconds: ${COMMERCE_GHN_TRACK_SYNC_COOLDOWN_SECONDS:300}
      print-token-ttl-minutes: ${COMMERCE_GHN_PRINT_TOKEN_TTL_MINUTES:30}
      print-base-url: ${COMMERCE_GHN_PRINT_BASE_URL:}
