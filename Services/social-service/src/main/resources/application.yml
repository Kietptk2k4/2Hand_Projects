server:
  port: 3002

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging:
  level:
    com.twohands.social_service: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.web: DEBUG

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5433/social_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false
    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/social_db}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    time-zone: Asia/Ho_Chi_Minh

jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  refresh-secret: ${JWT_REFRESH_SECRET}

  access-expiration: 900000
  refresh-expiration: 2592000000

social:
  commerce:
    base-url: ${COMMERCE_SERVICE_BASE_URL:http://localhost:3003}
    connect-timeout-ms: ${SOCIAL_COMMERCE_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${SOCIAL_COMMERCE_READ_TIMEOUT_MS:5000}
  object-storage:
    enabled: ${SOCIAL_MINIO_ENABLED:false}
    endpoint: ${SOCIAL_MINIO_ENDPOINT:http://localhost:9000}
    public-url: ${SOCIAL_MINIO_PUBLIC_URL:https://cdn.2hands.vn}
    access-key: ${SOCIAL_MINIO_ACCESS_KEY:admin}
    secret-key: ${SOCIAL_MINIO_SECRET_KEY:password123}
    post-bucket: ${MINIO_SOCIAL_POST_BUCKET:2hands-social-post}
    public-path-prefix: ${SOCIAL_MINIO_PUBLIC_PATH_PREFIX:}
    image-max-file-size-bytes: ${SOCIAL_POST_IMAGE_MAX_BYTES:10485760}
    video-max-file-size-bytes: ${SOCIAL_POST_VIDEO_MAX_BYTES:104857600}
    presigned-url-ttl-seconds: ${SOCIAL_POST_PRESIGNED_URL_TTL_SECONDS:900}
    allowed-image-content-types:
      - image/jpeg
      - image/png
      - image/webp
    allowed-video-content-types:
      - video/mp4
    post-media-upload:
      rate-limit:
        max-attempts: ${SOCIAL_POST_MEDIA_UPLOAD_RATE_LIMIT_MAX:30}
        window-seconds: ${SOCIAL_POST_MEDIA_UPLOAD_RATE_LIMIT_WINDOW_SECONDS:60}
  kafka:
    producer:
      enabled: ${SOCIAL_KAFKA_PRODUCER_ENABLED:false}
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      send-timeout-ms: ${SOCIAL_KAFKA_PRODUCER_SEND_TIMEOUT_MS:10000}
    consumer:
      enabled: ${SOCIAL_KAFKA_CONSUMER_ENABLED:false}
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: social-user-projection
      post-moderated-group-id: social-post-moderated
      post-moderated-topics:
        - admin.post.moderated
        - admin.post.restored
      comment-moderated-group-id: social-comment-moderated
      comment-moderated-topics:
        - admin.comment.moderated
        - admin.comment.restored
      commerce-product-removed-group-id: social-commerce-product-removed
      commerce-product-removed-topics:
        - commerce.product.removed
      commerce-product-restored-group-id: social-commerce-product-restored
      commerce-product-restored-topics:
        - commerce.product.restored
      topics:
        - auth.user.created
        - auth.user.updated
        - auth.user.deleted
        - admin.user.suspended
        - admin.user.banned
        - admin.user.restricted
        - admin.user.enforcement_revoked
        - admin.user.enforcement_expired
  outbox:
    publish:
      enabled: ${SOCIAL_OUTBOX_PUBLISH_ENABLED:false}
      cron: ${SOCIAL_OUTBOX_PUBLISH_CRON:0/1 * * * * *}
      max-retries: ${SOCIAL_OUTBOX_PUBLISH_MAX_RETRIES:5}
      batch-size: ${SOCIAL_OUTBOX_PUBLISH_BATCH_SIZE:50}
    retry:
      enabled: ${SOCIAL_OUTBOX_RETRY_ENABLED:false}
      cron: ${SOCIAL_OUTBOX_RETRY_CRON:0 */1 * * * *}
      max-retries: ${SOCIAL_OUTBOX_RETRY_MAX_RETRIES:5}
      pending-timeout-seconds: ${SOCIAL_OUTBOX_RETRY_PENDING_TIMEOUT_SECONDS:300}
      batch-size: ${SOCIAL_OUTBOX_RETRY_BATCH_SIZE:50}