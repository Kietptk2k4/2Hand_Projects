server:
  port: 3002

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5433/social_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false
    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/social_db}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    time-zone: Asia/Ho_Chi_Minh

jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  refresh-secret: ${JWT_REFRESH_SECRET}

  access-expiration: 900000
  refresh-expiration: 2592000000

social:
  kafka:
    consumer:
      enabled: ${SOCIAL_KAFKA_CONSUMER_ENABLED:false}
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: social-user-projection
      topics:
        - auth.user.created
        - auth.user.updated
        - auth.user.deleted
        - admin.user.suspended
        - admin.user.banned
        - admin.user.restricted
        - admin.user.enforcement_revoked
        - admin.user.enforcement_expired
  outbox:
    publish:
      enabled: ${SOCIAL_OUTBOX_PUBLISH_ENABLED:false}
      cron: ${SOCIAL_OUTBOX_PUBLISH_CRON:0/10 * * * * *}
      max-retries: ${SOCIAL_OUTBOX_PUBLISH_MAX_RETRIES:5}
      batch-size: ${SOCIAL_OUTBOX_PUBLISH_BATCH_SIZE:50}
    retry:
      enabled: ${SOCIAL_OUTBOX_RETRY_ENABLED:false}
      cron: ${SOCIAL_OUTBOX_RETRY_CRON:0 */1 * * * *}
      max-retries: ${SOCIAL_OUTBOX_RETRY_MAX_RETRIES:5}
      pending-timeout-seconds: ${SOCIAL_OUTBOX_RETRY_PENDING_TIMEOUT_SECONDS:300}
      batch-size: ${SOCIAL_OUTBOX_RETRY_BATCH_SIZE:50}