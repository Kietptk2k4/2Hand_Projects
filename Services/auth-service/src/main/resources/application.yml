server:
  port: ${SERVER_PORT:3001}
  error:
    include-message: always
    include-stacktrace: always

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

spring:
  application:
    name: auth-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

    hikari:
      pool-name: auth-service-hikari
      minimum-idle: ${DB_HIKARI_MIN_IDLE:5}
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:20}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false
    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s

  security:
    oauth2:
      client:

        registration:

          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

            scope:
              - openid
              - profile
              - email

            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}

            scope:
              - email
              - public_profile

            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

        provider:

          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
            token-uri: https://graph.facebook.com/v18.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture.width(200).height(200)
            user-name-attribute: id

jwt:
  access-secret: ${JWT_ACCESS_SECRET:replace-with-at-least-32-characters-access-key}
  refresh-secret: ${JWT_REFRESH_SECRET:replace-with-at-least-32-characters-refresh-key}

  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

auth:
  oauth2:
    redirect:
      success-url: ${AUTH_OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:5173/oauth/success}
      failure-url: ${AUTH_OAUTH2_FAILURE_REDIRECT_URL:http://localhost:5173/oauth/failure}
    cookie:
      secure: ${AUTH_OAUTH2_COOKIE_SECURE:false}

  register:
    verify-token-ttl-seconds: ${AUTH_REGISTER_VERIFY_TOKEN_TTL_SECONDS:900}

    rate-limit:
      max-attempts: ${AUTH_REGISTER_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${AUTH_REGISTER_RATE_LIMIT_WINDOW_SECONDS:3600}

  login:
    rate-limit:
      max-attempts: ${AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${AUTH_LOGIN_RATE_LIMIT_WINDOW_SECONDS:900}

  refresh:
    rate-limit:
      max-attempts: ${AUTH_REFRESH_RATE_LIMIT_MAX_ATTEMPTS:20}
      window-seconds: ${AUTH_REFRESH_RATE_LIMIT_WINDOW_SECONDS:60}

  logout:
    rate-limit:
      max-attempts: ${AUTH_LOGOUT_RATE_LIMIT_MAX_ATTEMPTS:30}
      window-seconds: ${AUTH_LOGOUT_RATE_LIMIT_WINDOW_SECONDS:60}

  forgot-password:
    reset-token-ttl-seconds: ${AUTH_FORGOT_PASSWORD_RESET_TOKEN_TTL_SECONDS:900}

    rate-limit:
      max-attempts: ${AUTH_FORGOT_PASSWORD_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${AUTH_FORGOT_PASSWORD_RATE_LIMIT_WINDOW_SECONDS:900}

  resend-email-verification:
    rate-limit:
      max-attempts: ${AUTH_RESEND_EMAIL_VERIFICATION_RATE_LIMIT_MAX_ATTEMPTS:3}
      window-seconds: ${AUTH_RESEND_EMAIL_VERIFICATION_RATE_LIMIT_WINDOW_SECONDS:900}

  verify-email:
    rate-limit:
      max-attempts: ${AUTH_VERIFY_EMAIL_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_VERIFY_EMAIL_RATE_LIMIT_WINDOW_SECONDS:900}

  object-storage:
    enabled: ${AUTH_MINIO_ENABLED:false}
    endpoint: ${AUTH_MINIO_ENDPOINT:http://localhost:9000}
    public-url: ${AUTH_MINIO_PUBLIC_URL:https://cdn.2hands.vn}
    access-key: ${AUTH_MINIO_ACCESS_KEY:admin}
    secret-key: ${AUTH_MINIO_SECRET_KEY:password123}
    avatar-bucket: ${MINIO_AVATAR_BUCKET:2hands-avatar}
    avatar-max-file-size-bytes: ${AUTH_AVATAR_MAX_FILE_SIZE_BYTES:5242880}
    presigned-url-ttl-seconds: ${AUTH_AVATAR_PRESIGNED_URL_TTL_SECONDS:900}
    allowed-avatar-content-types:
      - image/jpeg
      - image/png
      - image/webp
    avatar-upload:
      rate-limit:
        max-attempts: ${AUTH_AVATAR_UPLOAD_RATE_LIMIT_MAX_ATTEMPTS:30}
        window-seconds: ${AUTH_AVATAR_UPLOAD_RATE_LIMIT_WINDOW_SECONDS:3600}

  kafka:
    producer:
      enabled: ${AUTH_KAFKA_PRODUCER_ENABLED:false}
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      send-timeout-ms: ${AUTH_KAFKA_PRODUCER_SEND_TIMEOUT_MS:10000}
    consumer:
      enabled: ${AUTH_KAFKA_CONSUMER_ENABLED:false}
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: auth-user-enforcement
      topics:
        - admin.user.suspended
        - admin.user.banned
        - admin.user.restricted
        - admin.user.enforcement_revoked
        - admin.user.enforcement_expired

  outbox:
    publish:
      enabled: ${AUTH_OUTBOX_PUBLISH_ENABLED:false}
      cron: ${AUTH_OUTBOX_PUBLISH_CRON:0/1 * * * * *}
      max-retries: ${AUTH_OUTBOX_PUBLISH_MAX_RETRIES:5}
      batch-size: ${AUTH_OUTBOX_PUBLISH_BATCH_SIZE:50}
    retry:
      enabled: ${AUTH_OUTBOX_RETRY_ENABLED:false}
      cron: ${AUTH_OUTBOX_RETRY_CRON:0 */1 * * * *}
      max-retries: ${AUTH_OUTBOX_RETRY_MAX_RETRIES:5}
      pending-timeout-seconds: ${AUTH_OUTBOX_RETRY_PENDING_TIMEOUT_SECONDS:300}
      batch-size: ${AUTH_OUTBOX_RETRY_BATCH_SIZE:50}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.twohands.auth_service: INFO

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.twohands.auth_service: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG
    org.springframework.data.redis: DEBUG
    io.lettuce.core: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.twohands.auth_service: INFO
    org.springframework.security: WARN