server:
  port: ${SERVER_PORT:3001}

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      pool-name: auth-service-hikari
      minimum-idle: ${DB_HIKARI_MIN_IDLE:5}
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:20}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s

jwt:
  access-secret: ${JWT_ACCESS_SECRET:replace-with-at-least-32-characters-access-key}
  refresh-secret: ${JWT_REFRESH_SECRET:replace-with-at-least-32-characters-refresh-key}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

auth:
  register:
    verify-token-ttl-seconds: ${AUTH_REGISTER_VERIFY_TOKEN_TTL_SECONDS:900}
    rate-limit:
      max-attempts: ${AUTH_REGISTER_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${AUTH_REGISTER_RATE_LIMIT_WINDOW_SECONDS:3600}
  login:
    rate-limit:
      max-attempts: ${AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${AUTH_LOGIN_RATE_LIMIT_WINDOW_SECONDS:900}
  refresh:
    rate-limit:
      max-attempts: ${AUTH_REFRESH_RATE_LIMIT_MAX_ATTEMPTS:20}
      window-seconds: ${AUTH_REFRESH_RATE_LIMIT_WINDOW_SECONDS:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.twohands.auth_service: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.twohands.auth_service: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.twohands.auth_service: INFO
    org.springframework.security: WARN
