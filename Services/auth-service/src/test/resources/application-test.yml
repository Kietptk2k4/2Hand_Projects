spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:auth_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

auth:
  oauth2:
    redirect:
      success-url: http://localhost:5173/oauth/success
      failure-url: http://localhost:5173/oauth/failure
    cookie:
      secure: false
  register:
    rate-limit:
      max-attempts: 10000
      window-seconds: 3600
  login:
    rate-limit:
      max-attempts: 10000
      window-seconds: 3600
  refresh:
    rate-limit:
      max-attempts: 10000
      window-seconds: 3600
  logout:
    rate-limit:
      max-attempts: 10000
      window-seconds: 3600
  forgot-password:
    reset-token-ttl-seconds: 900
    rate-limit:
      max-attempts: 10000
      window-seconds: 3600
  resend-email-verification:
    rate-limit:
      max-attempts: 10000
      window-seconds: 3600
  outbox:
    publish:
      enabled: false
      cron: "0 */5 * * * *"
      max-retries: 5
      batch-size: 50
    retry:
      enabled: false
      cron: "0 */5 * * * *"
      max-retries: 5
      pending-timeout-seconds: 300
      batch-size: 50

jwt:
  access-secret: test-access-secret-key-minimum-32-characters-123456
  refresh-secret: test-refresh-secret-key-minimum-32-characters-1234

logging:
  level:
    root: WARN
