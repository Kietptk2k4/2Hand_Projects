spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/auth_service?options=-c%20TimeZone%3DUTC}
    username: ${DB_USERNAME:kietne}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

    consumer:
      group-id: auth-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

logging:
  level:
    org.springframework.security: DEBUG
    com.twohands.authservice: INFO

auth:
  otp:
    ttl-seconds: 300
    max-attempts: 5

  resend:
    max-times: 3
    window-seconds: 3600

  rate-limit:
    max-requests: 5
    window-seconds: 60
    login:
      max-requests: ${RATE_LIMIT_LOGIN_MAX_REQUESTS:5}
      window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
    refresh:
      max-requests: ${RATE_LIMIT_REFRESH_MAX_REQUESTS:10}
      window-seconds: ${RATE_LIMIT_REFRESH_WINDOW_SECONDS:60}
    session:
      max-requests: ${RATE_LIMIT_SESSION_MAX_REQUESTS:20}
      window-seconds: ${RATE_LIMIT_SESSION_WINDOW_SECONDS:60}

  security:
    failed-login-lock-threshold: ${SECURITY_FAILED_LOGIN_LOCK_THRESHOLD:5}
    failed-login-window-seconds: ${SECURITY_FAILED_LOGIN_WINDOW_SECONDS:900}
    suspicious-reuse-lock-threshold: ${SECURITY_SUSPICIOUS_REUSE_LOCK_THRESHOLD:2}
    suspicious-reuse-window-seconds: ${SECURITY_SUSPICIOUS_REUSE_WINDOW_SECONDS:900}

  outbox:
    poll-delay-ms: 5000

  cleanup:
    retention-hours: 24
    cron: "0 0 * * * *"

  jwt:
    secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-key-in-production!!}
    issuer: ${JWT_ISSUER:auth-service}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS:900}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:2592000}

  reset:
    ttl-seconds: ${RESET_TOKEN_TTL_SECONDS:900}

  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    facebook:
      app-id: ${FACEBOOK_APP_ID:}
      app-secret: ${FACEBOOK_APP_SECRET:}
