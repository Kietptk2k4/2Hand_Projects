server:
  port: 3004

spring:
  application:
    name: notification-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5435/notification_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    time-zone: Asia/Ho_Chi_Minh

jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  refresh-secret: ${JWT_REFRESH_SECRET}
  access-expiration: 900000
  refresh-expiration: 2592000000

notification:
  ingest:
    internal-enabled: ${NOTIFICATION_INTERNAL_INGEST_ENABLED:true}
    internal-api-key: ${NOTIFICATION_INTERNAL_API_KEY:dev-internal-key}
  workers:
    process-events:
      enabled: ${NOTIFICATION_PROCESS_EVENTS_ENABLED:false}
      cron: ${NOTIFICATION_PROCESS_EVENTS_CRON:0/30 * * * * *}
      batch-size: ${NOTIFICATION_PROCESS_EVENTS_BATCH_SIZE:50}
    retry-events:
      enabled: ${NOTIFICATION_RETRY_EVENTS_ENABLED:false}
      cron: ${NOTIFICATION_RETRY_EVENTS_CRON:0 */1 * * * *}
      batch-size: ${NOTIFICATION_RETRY_EVENTS_BATCH_SIZE:50}
      base-backoff-seconds: ${NOTIFICATION_RETRY_EVENTS_BASE_BACKOFF_SECONDS:30}
      max-backoff-seconds: ${NOTIFICATION_RETRY_EVENTS_MAX_BACKOFF_SECONDS:3600}
    recover-stale-processing:
      enabled: ${NOTIFICATION_RECOVER_STALE_PROCESSING_ENABLED:false}
      cron: ${NOTIFICATION_RECOVER_STALE_PROCESSING_CRON:0 */5 * * * *}
      batch-size: ${NOTIFICATION_RECOVER_STALE_PROCESSING_BATCH_SIZE:50}
      processing-timeout-seconds: ${NOTIFICATION_RECOVER_STALE_PROCESSING_TIMEOUT_SECONDS:300}
    retry-delivery:
      enabled: ${NOTIFICATION_RETRY_DELIVERY_ENABLED:false}
      cron: ${NOTIFICATION_RETRY_DELIVERY_CRON:0 */2 * * * *}
      batch-size: ${NOTIFICATION_RETRY_DELIVERY_BATCH_SIZE:50}
      max-retry-count: ${NOTIFICATION_RETRY_DELIVERY_MAX_RETRY_COUNT:5}
      base-backoff-seconds: ${NOTIFICATION_RETRY_DELIVERY_BASE_BACKOFF_SECONDS:30}
      max-backoff-seconds: ${NOTIFICATION_RETRY_DELIVERY_MAX_BACKOFF_SECONDS:3600}
    cleanup-invalid-device-tokens:
      enabled: ${NOTIFICATION_CLEANUP_INVALID_DEVICE_TOKENS_ENABLED:false}
      cron: ${NOTIFICATION_CLEANUP_INVALID_DEVICE_TOKENS_CRON:0 0 3 * * *}
      batch-size: ${NOTIFICATION_CLEANUP_INVALID_DEVICE_TOKENS_BATCH_SIZE:100}
      stale-inactive-days: ${NOTIFICATION_CLEANUP_INVALID_DEVICE_TOKENS_STALE_INACTIVE_DAYS:90}
  system-announcement:
    fan-out-batch-size: ${NOTIFICATION_SYSTEM_ANNOUNCEMENT_FAN_OUT_BATCH_SIZE:100}
    audience-page-size: ${NOTIFICATION_SYSTEM_ANNOUNCEMENT_AUDIENCE_PAGE_SIZE:500}
  integrations:
    fcm:
      enabled: ${NOTIFICATION_FCM_ENABLED:false}
    email:
      enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
      from-address: ${NOTIFICATION_EMAIL_FROM:noreply@2hands.vn}
      from-name: ${NOTIFICATION_EMAIL_FROM_NAME:2Hands}
      verification-link-base-url: ${NOTIFICATION_EMAIL_VERIFICATION_LINK_BASE_URL:https://2hands.vn/verify-email}
      password-reset-link-base-url: ${NOTIFICATION_EMAIL_PASSWORD_RESET_LINK_BASE_URL:https://2hands.vn/reset-password}
  kafka:
    consumer:
      enabled: ${NOTIFICATION_KAFKA_CONSUMER_ENABLED:false}
      bootstrap-servers: ${NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID:notification-domain-events}
